<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Контент-завод</title>
  <meta name="description" content="Контент-завод: ИИ-генерация идей, медиа, очередь и публикация в Telegram." />

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap");

    :root {
      color-scheme: dark;
      --bg-base: #09090b;
      --bg-panel: #18181b;
      --bg-hover: #27272a;
      --border: #3f3f46;
      --border-focus: #facc15;

      --text-main: #f4f4f5;
      --text-muted: #a1a1aa;

      --accent: #facc15;
      --accent-hover: #eab308;
      --accent-text: #09090b;

      --success: #22c55e;
      --success-bg: rgba(34, 197, 94, 0.1);
      --danger: #ef4444;
      --danger-bg: rgba(239, 68, 68, 0.1);
      --info: #3b82f6;
      --info-bg: rgba(59, 130, 246, 0.1);

      --radius: 6px;
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;

      --sidebar-width: 260px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg-base);
      color: var(--text-main);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* Typography */
    h1,
    h2,
    h3,
    p {
      margin: 0 0 16px 0;
    }

    .title-xl {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--text-main);
      line-height: 1.1;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .title-sm {
      font-size: 16px;
      font-weight: 600;
    }

    .kicker {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .lead {
      font-size: 16px;
      color: var(--text-muted);
    }

    .text {
      color: var(--text-muted);
    }

    .text-mono {
      font-family: var(--font-mono);
      font-size: 12px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* Layout Base */
    .app {
      display: none;
      height: 100vh;
      grid-template-columns: var(--sidebar-width) 1fr;
    }

    body.logged-in .app {
      display: grid;
    }

    /* Sidebar */
    .sidebar {
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: sticky;
      top: 0;
    }

    .brand {
      padding: 24px;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.03em;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand::before {
      content: '';
      display: block;
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 2px;
    }

    .nav {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      overflow-y: auto;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-muted);
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
      transition: all 0.15s;
      width: 100%;
      text-align: left;
    }

    .nav-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .nav-btn:hover {
      background: var(--bg-hover);
      color: var(--text-main);
    }

    .nav-btn.active {
      background: var(--bg-hover);
      color: var(--text-main);
      border-color: var(--border);
      font-weight: 600;
    }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Main Area */
    .main {
      padding: 40px;
      height: 100vh;
      overflow-y: auto;
      background: var(--bg-base);
    }

    /* Auth Screen */
    .auth {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      padding: 32px;
      border-radius: var(--radius);
    }

    /* Core UI Elements */
    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
    }

    .pad {
      /* utility for compat */
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .auto {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .auto-tight {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }

    /* Forms & Inputs */
    .form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .input,
    .textarea,
    .select {
      width: 100%;
      background: var(--bg-base);
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 10px 12px;
      border-radius: var(--radius);
      font-family: var(--font-sans);
      font-size: 14px;
      transition: border-color 0.15s;
    }

    .input:focus,
    .textarea:focus,
    .select:focus {
      outline: none;
      border-color: var(--border-focus);
    }

    .textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.5;
    }

    /* Buttons */
    button {
      font-family: var(--font-sans);
      cursor: pointer;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg-base);
      border: 1px solid var(--border);
      color: var(--text-main);
      border-radius: var(--radius);
      font-weight: 500;
      font-size: 13px;
      transition: all 0.1s;
      min-height: 36px;
    }

    .btn:hover {
      background: var(--bg-hover);
      border-color: var(--text-muted);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn.primary {
      background: var(--accent);
      color: var(--accent-text);
      border-color: var(--accent);
      font-weight: 600;
    }

    .btn.primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .btn.danger {
      color: var(--danger);
      border-color: var(--danger-bg);
      background: var(--danger-bg);
    }

    .btn.danger:hover {
      background: var(--danger);
      color: #fff;
    }

    .btn.green {
      color: var(--success);
      border-color: var(--success-bg);
      background: var(--success-bg);
    }

    .btn.green:hover {
      background: var(--success);
      color: #fff;
    }

    .btn.small {
      padding: 6px 12px;
      font-size: 12px;
      min-height: 28px;
    }

    .btn.icon-only {
      padding: 8px;
    }

    /* Chips & Badges */
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: var(--bg-hover);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .chip.ok {
      background: var(--success-bg);
      color: var(--success);
      border-color: transparent;
    }

    .chip.warn {
      background: rgba(250, 204, 21, 0.1);
      color: var(--accent);
      border-color: transparent;
    }

    .chip.bad {
      background: var(--danger-bg);
      color: var(--danger);
      border-color: transparent;
    }

    .chip.info {
      background: var(--info-bg);
      color: var(--info);
      border-color: transparent;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      background: var(--accent);
      color: var(--accent-text);
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    /* Project/Idea/Media Cards */
    .idea,
    .media-card,
    .queue-card,
    .project-card,
    .template-card {
      background: var(--bg-base);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: left;
      transition: all 0.15s;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .idea:hover,
    .project-card:hover,
    .template-card:hover {
      border-color: var(--text-muted);
    }

    .idea.active,
    .project-card.active,
    .template-card.active {
      border-color: var(--accent);
      background: rgba(250, 204, 21, 0.05);
    }

    .item-title {
      font-weight: 600;
      font-size: 15px;
      color: var(--text-main);
    }

    .item-sub {
      font-size: 12px;
      color: var(--text-muted);
    }

    .item-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    /* Kanban Board */
    .kanban-board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      align-items: start;
    }

    .kanban-column {
      background: var(--bg-base);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 400px;
    }

    .kanban-column-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .kanban-column-count {
      background: var(--bg-hover);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
    }

    .kanban-card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: var(--radius);
      cursor: grab;
      font-size: 13px;
    }

    .kanban-card:active {
      cursor: grabbing;
    }

    .kanban-card.is-dragging {
      opacity: 0.5;
      border-style: dashed;
    }

    .kanban-card-title {
      font-weight: 500;
      margin-bottom: 8px;
    }

    .kanban-card-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
    }

    .kanban-column.drag-over {
      border-color: var(--accent);
      background: rgba(250, 204, 21, 0.05);
    }

    /* specific structural overrides for factory layout */
    .workbench {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
      align-items: start;
    }

    .brief-panel {
      position: sticky;
      top: 0;
    }

    /* Visual Previews */
    .preview {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--bg-base);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--text-muted);
    }

    .preview img,
    .preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .empty {
      padding: 32px;
      text-align: center;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      font-size: 13px;
    }

    /* Logs & Tables */
    .log {
      padding: 12px;
      border-left: 2px solid var(--border);
      background: var(--bg-base);
      margin-bottom: 8px;
      border-radius: 0 var(--radius) var(--radius) 0;
    }

    .log.ok {
      border-left-color: var(--success);
    }

    .log.bad {
      border-left-color: var(--danger);
    }

    .log.warn {
      border-left-color: var(--accent);
    }

    .log-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .log-text {
      font-size: 13px;
      font-weight: 500;
    }

    .log-meta {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      white-space: pre-wrap;
      overflow-x: auto;
    }

    /* Output Editor Box */
    .output-box {
      background: var(--bg-base);
      border: 1px solid var(--border);
      padding: 24px;
      border-radius: var(--radius);
    }

    /* Modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(4px);
      display: grid;
      place-items: center;
      z-index: 100;
      padding: 24px;
    }

    .modal-card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
    }

    .modal-head {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }

    .modal-body {
      padding: 24px;
      overflow-y: auto;
    }

    .modal-pre {
      font-family: var(--font-mono);
      font-size: 12px;
      background: var(--bg-base);
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Loading state overlay */
    .generation-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .generation-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .generation-spinner {
      width: 40px;
      height: 40px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-line {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent);
      z-index: 1000;
      transform-origin: left;
      transform: scaleX(0);
      transition: transform 0.2s;
      display: none;
    }

    .loading-line.show {
      display: block;
      animation: loadingLine 2s infinite ease-in-out;
    }

    @keyframes loadingLine {
      0% {
        transform: scaleX(0);
      }

      50% {
        transform: scaleX(1);
        transform-origin: left;
      }

      51% {
        transform-origin: right;
      }

      100% {
        transform: scaleX(0);
        transform-origin: right;
      }
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--text-main);
      color: var(--bg-base);
      padding: 12px 24px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 13px;
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.2s;
      z-index: 2000;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    /* Placement Picker (small override) */
    .placement-picker,
    .modal-placement-picker {
      display: flex;
      gap: 8px;
    }

    .placement-btn,
    .modal-placement-btn {
      flex: 1;
      padding: 8px;
      background: var(--bg-base);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
    }

    .placement-btn.active,
    .modal-placement-btn.active {
      background: var(--bg-hover);
      color: var(--text-main);
      border-color: var(--accent);
    }

    /* Utility blocks replaced */
    .notice {
      background: rgba(250, 204, 21, 0.05);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      padding: 16px;
      border-radius: var(--radius);
      margin-bottom: 24px;
    }

    /* Specific metrics */
    .metric {
      background: var(--bg-base);
      border: 1px solid var(--border);
      padding: 16px;
      border-radius: var(--radius);
    }

    .metric-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-main);
      font-family: var(--font-mono);
    }

    .metric-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 8px;
    }

    /* Platform buttons */
    .platforms {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .platform {
      background: var(--bg-base);
      border: 1px solid var(--border);
      padding: 12px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      flex: 1;
      min-width: 140px;
      text-align: left;
    }

    .platform.active {
      border-color: var(--accent);
      background: var(--bg-hover);
    }

    .platform-title {
      display: block;
      font-weight: 600;
      font-size: 13px;
      color: var(--text-main);
    }

    .platform-sub {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Burger for mobile */
    .burger-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text-main);
    }

    @media (max-width: 1024px) {
      .workbench {
        grid-template-columns: 1fr;
      }

      .brief-panel {
        position: static;
      }
    }

    @media (max-width: 768px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
        position: fixed;
        z-index: 50;
        width: 80%;
        max-width: 300px;
      }

      .sidebar.open {
        display: flex;
      }

      .main {
        padding: 24px;
      }

      .burger-btn {
        display: block;
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 60;
        background: var(--bg-panel);
        border: 1px solid var(--border);
        padding: 8px;
        border-radius: var(--radius);
      }
    }
  </style>

</head>

<body>
  <div class="loading-line" id="loadingLine"></div>

  <section class="auth" id="authScreen">
    <div class="auth-card">
      <h2 class="title-xl" style="margin-bottom: 8px;">Контент-завод</h2>
      <p class="text" id="authText" style="margin-bottom: 24px;">Рабочая среда перформанс-маркетолога.</p>

      <form class="form" id="authForm">
        <label class="field">
          <span class="label">Логин</span>
          <input class="input" id="emailInput" type="text" placeholder="admin@example.com" required />
        </label>

        <label class="field">
          <span class="label">Пароль</span>
          <div style="position: relative; display: flex;">
            <input class="input" id="passwordInput" type="password" placeholder="••••••••"
              autocomplete="current-password" required style="padding-right: 40px;" />
            <button class="btn icon-only" type="button" data-auth-password-toggle aria-label="Показать пароль"
              style="position: absolute; right: 4px; top: 4px; background: transparent; border: none; min-height: auto; padding: 4px;"></button>
          </div>
        </label>

        <button class="btn primary" id="authSubmitBtn" type="submit" style="margin-top: 8px;">Войти</button>
        <button class="btn" id="authModeToggle" type="button" style="display: none;"></button>
        <div class="notice" id="authError" style="display:none; margin-top: 16px; margin-bottom: 0;"></div>
      </form>
    </div>
  </section>

  <button class="burger-btn" id="burgerBtn" data-action="toggle-burger">Меню</button>

  <div class="app" id="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">Контент-завод</div>
      <nav class="nav" id="nav" role="navigation"></nav>
      <div class="sidebar-footer">

      async function request(path, options = {}) {
        const headers = {};
        let body = options.body;

        if (!(body instanceof FormData)) {
          headers["Content-Type"] = "application/json";
          body = body ? JSON.stringify(body) : undefined;
        }

        if (!options.public) headers.Authorization = "Bearer " + token();

        const controller = new AbortController();
        const timeoutMs = options.timeoutMs || (path === "/api/generate" ? 300000 : 30000);
        const timer = setTimeout(() => controller.abort(), timeoutMs);

        let response;
        try {
          response = await fetch(path, { method: options.method || "GET", headers, body, signal: controller.signal });
        } catch (error) {
          if (error?.name === "AbortError") {
            throw new Error(`Запрос не ответил за ${Math.round(timeoutMs / 1000)} секунд. Попробуй запустить ещё раз.`);
          }
          throw error;
        } finally {
          clearTimeout(timer);
        }

        const text = await response.text();
        let data;
        try { data = text ? JSON.parse(text) : {}; } catch { data = { raw: text }; }

        if (response.status === 401 && !options.public) {
          logout();
          throw new Error("Сессия истекла. Войди заново.");
        }

        if (!response.ok) throw new Error(data.error || data.message || data.raw || "Ошибка запроса");
        return data;
      }

        if (state.planner.publishTime === undefined || state.planner.publishTime === null) state.planner.publishTime = nextHourInputValue();
        return state.planner;
      }
      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function cleanError(message) {
        const text = String(message || "Ошибка");
        if (text.includes("API_KEY_INVALID") || text.includes("401")) return "Отказ: проверь токен в переменных сервера.";
        if (text.toLowerCase().includes("connection error")) return "Ошибка подключения к агенту.";
        if (/timeout|timed out/i.test(text)) return "ИИ отвечает слишком долго. Попробуй еще раз.";
        if (text.includes("TIMEWEB_API_KEY")) return "ИИ-подключение не настроено на бэке.";
        if (text.includes("429") || text.includes("limit")) return "Лимиты API исчерпаны.";
        return text;
      }

      // --- PARSERS & VISUALIZERS ---
      function parseReelsScript(text) {
        if (!text) return [];
        const scenes = [];
        const blocks = text.split(/(?=Кадр \d|Сцена \d|\b\d\b\.?\s*(?:Кадр|Сцена))/i);
        
        blocks.forEach((block) => {
          const trimmed = block.trim();
          if (!trimmed) return;
          
          const titleMatch = trimmed.match(/^(?:Кадр|Сцена)?\s*\d+[:\.]?\s*/i);
          const title = titleMatch ? titleMatch[0].replace(/[:\.]\s*$/, "") : "";
          
          const timeMatch = trimmed.match(/(?:\d+[-–]\d+\s*(?:сек|с)|секунд[ыа]?\s*\d+[-–]\d+|\b\d+\s*сек\b)/i);
          const time = timeMatch ? timeMatch[0] : "";
          
          const visualMatch = trimmed.match(/(?:Визуал|В кадре|Кадр|Что в кадре)[:\-]?\s*([^\n]+)/i);
          const visual = visualMatch ? visualMatch[1].trim() : "";
          
          const voiceMatch = trimmed.match(/(?:Голос|Речь|Диктор|Текст)[:\-]?\s*([^\n]+)/i);
          const voice = voiceMatch ? voiceMatch[1].trim() : trimmed.substring(0, 100);
          
          const screenMatch = trimmed.match(/(?:Текст на экране|Субтитры|Надпись)[:\-]?\s*([^\n]+)/i);
          const screenText = screenMatch ? screenMatch[1].trim() : "";
          
          scenes.push({
            title: title || `Кадр ${scenes.length + 1}`,
            time: time || (scenes.length === 0 ? "0-3 сек" : scenes.length === 1 ? "3-12 сек" : scenes.length === 2 ? "12-20 сек" : "20-25 сек"),
            visual: visual || trimmed.substring(0, 80) + "...",
            voice: voice || "",
            screenText: screenText || ""
          });
        });
        
        return scenes;
      }

      function renderReelsVisualizer(text) {
        const scenes = parseReelsScript(text);
        if (!scenes.length) return "";
        
        return `

      function parseRsyScript(text) {
        if (!text) return { headlines: [], texts: [], concepts: [], ctas: [] };
        
        const headlines = [];
        const texts = [];
        const concepts = [];
        const ctas = [];
        
        const lines = text.split("\n");
        lines.forEach((line) => {
          const trimmed = line.trim();
          if (!trimmed) return;
          
          if (/Заголовок\s*\d*[:\-]/i.test(trimmed) || /^\d+\.\s*(?:Заголовок|Заголовок\s+\d+)/i.test(trimmed)) {
            headlines.push(trimmed.replace(/^(?:Заголовок\s*\d*[:\-]|^\d+\.\s*(?:Заголовок|Заголовок\s+\d+)[:\-]?)\s*/i, ""));
          } else if (/Текст\s*\d*[:\-]/i.test(trimmed) || /^\d+\.\s*(?:Текст|Текст объявления)/i.test(trimmed)) {
            texts.push(trimmed.replace(/^(?:Текст\s*\d*[:\-]|^\d+\.\s*(?:Текст|Текст объявления)[:\-]?)\s*/i, ""));
          } else if (/Концепция|Визуал|Картинка/i.test(trimmed)) {
            concepts.push(trimmed.replace(/^(?:Визуальная концепция\s*\d*[:\-]|Визуал\s*\d*[:\-]|Концепция\s*\d*[:\-])\s*/i, ""));
          } else if (/CTA|Призыв/i.test(trimmed)) {
            ctas.push(trimmed.replace(/^(?:CTA\s*\d*[:\-]|Призыв\s*\d*[:\-]|Призыв к действию\s*\d*[:\-]?)\s*/i, ""));
          }
        });
        
        return { headlines, texts, concepts, ctas };
      }

      function renderRsyVisualizer(text) {
        const data = parseRsyScript(text);
        
        if (!data.headlines.length && !data.texts.length) {

        }
        
        return `
          <div class="panel" style="margin-top: 24px; border: 1px solid var(--border); background: rgba(255,255,255,0.01);">
            <h3 class="title-sm" style="color: var(--accent); margin-bottom: 16px; display: flex; align-items: center; gap: 8px;">

      function parseFaqScript(text) {
        if (!text) return [];
        
        const qaList = [];
        const blocks = text.split(/(?=Вопрос \d|Q\b\d\b|Вопрос:|Q:)/i);
        
        blocks.forEach((block) => {
          const trimmed = block.trim();
          if (!trimmed) return;
          
          const qMatch = trimmed.match(/(?:Вопрос|Q)[:\-]?\s*([^\n]+)/i);
          const question = qMatch ? qMatch[1].trim() : trimmed.split("\n")[0];
          
          const aMatch = trimmed.match(/(?:Ответ|A)[:\-]?\s*([\s\S]+)/i);
          const answer = aMatch ? aMatch[1].trim() : trimmed.split("\n").slice(1).join("\n").trim();
          
          if (question && answer) {
            qaList.push({
              question: question.replace(/^[QВопрос\s\d:\-\.]+/i, ""),
              answer: answer.replace(/^[AОтвет\s\d:\-\.]+/i, "")
            });
          }
        });
        
        return qaList;
      }

      function renderFaqVisualizer(text) {
        const qaList = parseFaqScript(text);
        if (!qaList.length) return "";
        
        return `

                    <span>❓ ${escapeHtml(qa.question)}</span>

      function parseAlternativeHooks(text) {
        if (!text) return [];
        const hooks = [];
        
        const match = text.match(/(?:Варианты хуков|Альтернативные хуки|3 варианта первого абзаца|3 варианта хука)[:\-]?\s*([\s\S]+?)(?=\n\n[А-ЯA-Z]|\n\n$|$)/i);
        
        if (match) {
          const lines = match[1].split("\n");
          lines.forEach((line) => {
            const trimmed = line.trim();
            if (trimmed && /^[0-9\-\*\•\.]/.test(trimmed)) {
              hooks.push(trimmed.replace(/^[0-9\-\*\•\.\s]+/, ""));
            }
          });
        }
        
        return hooks;
      }

      window.swapFirstParagraph = function(newParagraph) {
        const textarea = document.querySelector('[data-action="edit-content"][data-field="body"]');
        if (!textarea) return;
        
        const originalText = textarea.value;
        const paragraphs = originalText.split(/\n\s*\n/);
        
        if (paragraphs.length > 0) {
          paragraphs[0] = newParagraph;
          const newText = paragraphs.join("\n\n");
          textarea.value = newText;
          
          const event = new Event('input', { bubbles: true });
          textarea.dispatchEvent(event);
          
          showToast("Хук успешно заменен!");
        }
      };

      async function refineText(action) {
        const textarea = document.querySelector('[data-action="edit-content"][data-field="body"]');
        if (!textarea) return;
        
        const originalText = textarea.value;
        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        
        const isSelection = start !== end;
        const textToRefine = isSelection ? originalText.substring(start, end) : originalText;
        
        if (!textToRefine.trim()) {
          showToast("Сначала выдели или напиши текст для улучшения");
          return;
        }
        
        setBusy(true);
        showToast("ИИ улучшает текст...");
        try {
          const data = await request("/api/refine", {
            method: "POST",
            body: {
              text: textToRefine,
              action: action,
              project: activeProject()
            }
          });
          
          if (data.ok && data.refinedText) {
            let newText;
            if (isSelection) {
              newText = originalText.substring(0, start) + data.refinedText + originalText.substring(end);
            } else {
              newText = data.refinedText;
            }
            
            textarea.value = newText;
            
            const event = new Event('input', { bubbles: true });
            textarea.dispatchEvent(event);
            
            showToast("Текст успешно улучшен!");
          } else {
            showToast("Не удалось улучшить текст");
          }
        } catch (e) {
          showToast(cleanError(e.message));
        } finally {
          setBusy(false);
          render();
        }
      }

            <div class="kanban-column" id="kb-published" ondragover="event.preventDefault();" ondragenter="kanbanDragEnter(this)" ondragleave="kanbanDragLeave(this)" ondrop="handleKanbanDrop(event, this, 'published')">
              <div class="kanban-column-header">Опубликовано <span>${publishedItems.length}</span></div>
              ${publishedItems.length ? publishedItems.map(item => `
                <div class="kanban-card" style="opacity: 0.6;">
                  <div class="kanban-card-title" style="text-decoration: line-through;">${escapeHtml(item.title)}</div>
                </div>
              `).join("") : renderEmpty("Пусто")}
            </div>
          </div>
        `;
      }

      function renderProjects() {
        const project = activeProject();
        return `
          <div class="panel">
            <div class="row">
              <h1 class="title-xl">Проекты</h1>
              <button class="btn primary" data-action="new-project">Новый проект</button>
            </div>
          </div>
          <div class="workbench">
            <aside class="stack">
              ${state.projects.map(p => `
                <div class="project-card ${p.id === state.activeProjectId ? 'active' : ''}" data-action="select-project" data-id="${p.id}">
                  <div class="item-title">${escapeHtml(p.name)}</div>
                  <div class="item-sub">Бриф: ${p.briefText ? 'Заполнен' : 'Пуст'}</div>
                </div>
              `).join("")}
            </aside>
            <div class="panel">
              <h2 class="title">Настройки проекта</h2>
              <div class="form" style="margin-top: 16px;">
                <label class="field">
                  <span class="label">Название</span>
                  <input class="input" data-action="project-input" name="name" value="${escapeHtml(project.name)}" />
                </label>
                <label class="field">
                  <span class="label">Бриф</span>
                  <textarea class="textarea" data-action="project-input" name="briefText">${escapeHtml(project.briefText || "")}</textarea>
                </label>
                <div class="actions">
                  <button class="btn danger" data-action="delete-project">Удалить проект</button>
                </div>
              </div>
            </div>
          </div>
        `;
      }

      function renderSettings() {
        const s = state.settings;
        return `
          <div class="panel">
            <h1 class="title-xl">Настройки</h1>
            <p class="text">Конфигурация сервера и интеграций.</p>
          </div>
          <div class="auto">
            <div class="panel">
              <h2 class="title">Бэкенд и ИИ</h2>
              <div class="form" style="margin-top: 16px;">
                <div class="metric" style="padding: 12px;"><div class="metric-label">Статус API</div><div class="metric-value" style="font-size: 16px;">${escapeHtml(s.backendStatus || 'не проверен')}</div></div>
                <div class="actions">
                  <button class="btn primary" data-action="check-backend">Проверить бэк</button>
                  <button class="btn" data-action="check-ai-key">Тест ИИ</button>
                </div>
              </div>
            </div>
            <div class="panel">
              <h2 class="title">Telegram</h2>
              <div class="form" style="margin-top: 16px;">
                <label class="field"><span class="label">Bot Token</span><input class="input" type="password" data-action="setting-input" name="telegramBotToken" value="${escapeHtml(s.telegramBotToken)}" /></label>
                <label class="field"><span class="label">Chat ID</span><input class="input" data-action="setting-input" name="telegramChatId" value="${escapeHtml(s.telegramChatId)}" /></label>
                <button class="btn primary" data-action="save-server-config">Сохранить</button>
              </div>
            </div>
          </div>
        `;
      }

      function renderLogs() {
        return `
          <div class="panel">
            <div class="row">
              <h1 class="title-xl">Системный журнал</h1>
              <button class="btn danger" data-action="clear-logs">Очистить логи</button>
            </div>
            <div class="stack" style="margin-top: 24px;">
              ${state.logs.length ? state.logs.map(log => `
                <div class="log ${log.type}">
                  <div class="log-time">${escapeHtml(log.time)}</div>
                  <div class="log-text">${escapeHtml(log.text)}</div>
                  ${log.meta ? `<div class="log-meta">${escapeHtml(log.meta)}</div>` : ''}
                </div>
              `).join("") : renderEmpty("Журнал пуст.")}
            </div>
          </div>
        `;
      }

      // Small render helpers
      function renderIdea(item) {
        return `
          <div class="idea ${item.id === state.selectedIdeaId ? "active" : ""}" data-action="select-idea" data-id="${item.id}">
            <div class="item-title">${escapeHtml(item.title)}</div>
            <div class="item-sub">${escapeHtml(item.angle)}</div>
            <div class="item-foot"><span class="chip ok">${item.score}%</span></div>
          </div>
        `;
      }

      function renderPlatform(id) {
        return `<button class="platform ${state.activePlatform === id ? 'active' : ''}" data-action="select-platform" data-platform="${id}"><span class="platform-title">${escapeHtml(platforms[id].name)}</span><span class="platform-sub">${escapeHtml(platforms[id].short)}</span></button>`;
      }

      function renderTemplateCard(item) {
        return `
          <div class="template-card ${item.id === state.activeTemplateId ? 'active' : ''}" data-action="apply-template" data-template="${item.id}">
            <div class="item-title">${escapeHtml(item.name)}</div>
            <div class="item-sub">${escapeHtml(item.goal)}</div>
          </div>
        `;
      }

      function renderMediaItem(item) {
        return `
          <div class="media-card">
            ${renderPreview(item)}
            <div class="item-title" style="margin-top: 12px;">${escapeHtml(item.name)}</div>
            <div class="item-foot">
              <button class="btn small primary" data-action="select-media-card" data-id="${item.id}">Выбрать</button>
              <button class="btn danger small" data-action="delete-media" data-id="${item.id}">Удалить</button>
            </div>
          </div>
        `;
      }

      function renderQueueCard(item) {
        return `
          <div class="queue-card">
            <div class="row" style="margin: 0;">
              <div>
                <div class="item-title">${escapeHtml(item.title)}</div>
                <div class="item-sub">${escapeHtml(item.publishDate)} ${escapeHtml(item.publishTime)} | ${escapeHtml(item.platform)}</div>
              </div>
              <span class="chip ${item.status === 'published' ? 'ok' : item.status === 'error' ? 'bad' : 'info'}">${escapeHtml(item.state)}</span>
            </div>
            <div class="text-mono" style="margin: 12px 0;">${escapeHtml(shorten(item.body, 100))}</div>
            <div class="actions">
              <button class="btn small" data-action="open-queue" data-id="${item.id}">Редактировать</button>
              ${item.platform === 'telegram' ? `<button class="btn green small" data-action="publish-one" data-id="${item.id}">Отправить сейчас</button>` : ''}
              <button class="btn danger small" data-action="remove-queue" data-id="${item.id}">Удалить</button>
            </div>
          </div>
        `;
      }

      function renderPreview(item) {
        if (!item) return `<div class="preview">Нет файла</div>`;
        if (item.type?.startsWith("image/")) return `<div class="preview"><img src="${escapeHtml(item.url)}" alt="media"></div>`;
        if (item.type?.startsWith("video/")) return `<div class="preview"><video src="${escapeHtml(item.url)}"></video></div>`;
        return `<div class="preview">Файл</div>`;
      }

      function renderPlannerInput(name, label, value, placeholder, type = "text") {
        return `<label class="field"><span class="label">${escapeHtml(label)}</span><input class="input" type="${type}" data-action="planner-input" name="${name}" value="${escapeHtml(value || "")}" placeholder="${escapeHtml(placeholder)}" /></label>`;
      }

      function renderEmpty(text) { return `<div class="empty">${escapeHtml(text)}</div>`; }
      function shorten(str, len) { return str && str.length > len ? str.slice(0, len) + "..." : str; }
      function datePart(d) { return d ? d.split("T")[0] : ""; }

      /* Kanban Handlers */
      window.kanbanDragEnter = function (col) { col.classList.add('drag-over'); };
      window.kanbanDragLeave = function (col) { col.classList.remove('drag-over'); };
      window.handleKanbanDrop = function (event, col, target) {
        col.classList.remove('drag-over');
        if (window._kanbanDragCard) window._kanbanDragCard.classList.remove('is-dragging');
        event.preventDefault();
        try {
          const { type, id } = JSON.parse(event.dataTransfer.getData('text/plain'));
          if (target === 'ready' && type === 'idea') {
            state.selectedIdeaId = id; state.activeTab = 'factory';
            saveState(); render(); showToast("Открыто в редакторе");
          } else if (target === 'scheduled' && type === 'idea') {
            const idea = state.ideas.find(i => i.id === id);
            if (idea) {
              state.queue.push({
                id: uid('q'), title: idea.title, body: idea.formats?.telegram?.body || idea.title,
                tags: '', publishDate: todayInputValue(), publishTime: nextHourInputValue(),
                scheduledAt: `${todayInputValue()}T${nextHourInputValue()}`, platform: 'telegram',
                status: 'scheduled', state: 'Запланировано'
              });
              saveState(); render(); showToast("В очереди!");
            }
          } else if (target === 'published' && type === 'scheduled') {
            publishOne(id);
          }
        } catch (e) { }
      };

      /* Network / Logic hooks (same as before) */
      function workspacePayload() { return { activeProjectId: state.activeProjectId, activePlatform: state.activePlatform, activeTemplateId: state.activeTemplateId, selectedIdeaId: state.selectedIdeaId, selectedMediaId: state.selectedMediaId, planner: state.planner, projects: state.projects, ideas: state.ideas, media: state.media, queue: state.queue, logs: state.logs, critic: state.critic }; }
      function scheduleWorkspaceSave() { if (!serverSyncReady || !token()) return; clearTimeout(serverSaveTimer); serverSaveTimer = setTimeout(pushWorkspace, 800); }
      async function pushWorkspace() { if (!token()) return; try { await request("/api/workspace", { method: "PUT", body: { workspace: workspacePayload() } }); } catch (e) { } }
      async function fetchWorkspace() { if (!token()) return; try { const data = await request("/api/workspace"); serverSyncReady = true; if (data.workspace && data.workspace.projects) { state = { ...state, ...data.workspace }; ensurePlanner(); saveState(); render(); } } catch (e) { serverSyncReady = true; render(); } }
      async function checkBackend(withToast = true) { try { const data = await request("/api/health", { public: true }); state.settings.backendStatus = data.ok ? "работает" : "ошибка"; if (withToast) showToast("Сервер ОК"); render(); } catch (e) { state.settings.backendStatus = "ошибка"; if (withToast) showToast("Ошибка сервера"); render(); } }
      async function fetchConfig() { if (!token()) return; try { const data = await request("/api/config"); state.settings = { ...state.settings, ...data }; render(); } catch (e) { } }
      async function saveServerConfig() { setBusy(true); try { await request("/api/config", { method: "POST", body: { telegramBotToken: state.settings.telegramBotToken, telegramChatId: state.settings.telegramChatId } }); showToast("Сохранено"); await fetchConfig(); } catch (e) { showToast("Ошибка"); } finally { setBusy(false); render(); } }
      async function checkAiKey() { setBusy(true); try { await request("/api/ai/test", { method: "POST" }); showToast("ИИ работает"); } catch (e) { showToast("Ошибка ИИ"); } finally { setBusy(false); } }
      async function generate() {
        setBusy(true); showGenerationOverlay();
        try {
          const data = await request("/api/generate", { method: "POST", body: { project: activeProject(), settings: state.settings, platform: state.activePlatform, planner: ensurePlanner() } });
          state.ideas = (data.ideas || []).map(i => ({ id: uid("i"), ...i, status: "Готово" }));
          state.critic = data.critic || null;
          state.selectedIdeaId = state.ideas[0]?.id || ""; state.activeTab = "factory";
          showToast("Сгенерировано");
        } catch (e) {
          showToast(cleanError(e.message));
        } finally {
          hideGenerationOverlay(); setBusy(false); render();
        }
      }
      async function uploadMedia() {
        const file = document.getElementById("mediaFile")?.files?.[0]; if (!file) return;
        setBusy(true);
        try {
          const fd = new FormData(); fd.append("file", file); fd.append("projectId", activeProject().id);
          const data = await request("/api/upload", { method: "POST", body: fd });
          state.media.unshift({ id: data.id, name: data.name, type: data.type, size: data.size, url: data.url });
          showToast("Загружено");
        } catch (e) { showToast("Ошибка загрузки"); } finally { setBusy(false); render(); }
      }
      async function addToQueue() {
        const c = selectedContent(); if (!c.body) return;
        const p = ensurePlanner();
        state.queue.unshift({ id: uid("q"), projectId: state.activeProjectId, platform: state.activePlatform, title: c.headline, body: c.body, tags: c.tags, mediaId: state.selectedMediaId || "", status: "scheduled", state: "Запланировано", publishDate: p.publishDate, publishTime: p.publishTime, scheduledAt: `${p.publishDate}T${p.publishTime}` });
        state.activeTab = "queue"; render(); scrollToTop(); showToast("В очереди");
        pushWorkspace();
      }
      async function publishOne(id) {
        const post = state.queue.find(q => q.id === id); if (!post) return;
        post.state = "Публикуется"; render();
        try {
          await request("/api/publish/" + post.platform, { method: "POST", body: { post } });
          post.status = "published"; post.state = "Опубликовано"; showToast("Опубликовано");
        } catch (e) { post.status = "error"; post.state = "Ошибка"; showToast("Ошибка публикации"); } finally { render(); }
      }

      /* Modals */
      function openQueueModal(id) {
        const p = state.queue.find(q => q.id === id); if (!p) return;
        mountModal(`
          <div class="modal-backdrop" data-action="close-modal"><div class="modal-card"><div class="modal-head"><h2 class="modal-title">Редактировать</h2><button class="btn icon-only" data-action="close-modal">${icons.close}</button></div><div class="modal-body"><div class="form">
            <label class="field"><span class="label">Заголовок</span><input class="input" id="editQTitle" value="${escapeHtml(p.title)}"></label>
            <label class="field"><span class="label">Текст</span><textarea class="textarea" id="editQBody">${escapeHtml(p.body)}</textarea></label>
            <button class="btn primary" data-action="save-queue" data-id="${p.id}">Сохранить</button>
          </div></div></div></div>
        `);
      }
      async function copyText(text) { try { await navigator.clipboard.writeText(text); showToast("Скопировано"); } catch (e) { } }

      document.addEventListener("click", (e) => {
        const t = e.target.closest("[data-action]"); if (!t) return;
        const a = t.dataset.action;

        if (a === "close-modal") { el.modalRoot.innerHTML = ""; return; }
        if (a === "toggle-burger") { toggleNavMenu(); return; }
        if (a === "tab") { state.activeTab = t.dataset.tab; closeNavMenu(); render(); return; }
        if (a === "logout") { logout(); return; }
        if (a === "apply-template") { applyTemplateById(t.dataset.template); render(); return; }
        if (a === "generate") { generate(); return; }
        if (a === "select-idea") { state.selectedIdeaId = t.dataset.id; render(); return; }
        if (a === "select-platform") { state.activePlatform = t.dataset.platform; render(); return; }
        if (a === "add-to-queue") { addToQueue(); return; }
        if (a === "remove-queue") { state.queue = state.queue.filter(q => q.id !== t.dataset.id); render(); return; }
        if (a === "clear-queue") { state.queue = []; render(); return; }
        if (a === "publish-one") { publishOne(t.dataset.id); return; }
        if (a === "open-queue") { openQueueModal(t.dataset.id); return; }
        if (a === "save-queue") {
          const p = state.queue.find(q => q.id === t.dataset.id);
          if (p) { p.title = document.getElementById("editQTitle").value; p.body = document.getElementById("editQBody").value; }
          el.modalRoot.innerHTML = ""; render(); return;
        }
        if (a === "upload-media") { uploadMedia(); return; }
        if (a === "select-media-card") { state.selectedMediaId = t.dataset.id; showToast("Выбрано"); render(); return; }
        if (a === "delete-media") { state.media = state.media.filter(m => m.id !== t.dataset.id); render(); return; }
        if (a === "toggle-brief-mode") {
          state.briefMode = t.dataset.mode;
          saveState();
          render();
          return;
        }
        if (a === "new-project") { const id = uid("p"); state.projects.unshift({ id, name: "Новый проект", briefText: "", niche: "", offer: "", audience: "", pain: "", proof: "", common: "", tone: "", details: "", price: "", timelines: "", warranty: "", geo: "", landingPage: "", awareness: "Теплый", fear: "", reason: "", facts: "", goal: "", nextStep: "", leadMagnet: "", stopWords: "", competitors: "", advantages: "" }); state.activeProjectId = id; render(); return; }
        if (a === "delete-project") { if (state.projects.length > 1) { state.projects = state.projects.filter(p => p.id !== state.activeProjectId); state.activeProjectId = state.projects[0].id; render(); } return; }
        if (a === "select-project") { state.activeProjectId = t.dataset.id; render(); return; }
        if (a === "check-backend") { checkBackend(); return; }
        if (a === "check-ai-key") { checkAiKey(); return; }
        if (a === "save-server-config") { saveServerConfig(); return; }
        if (a === "clear-logs") { state.logs = []; render(); return; }
        if (a === "copy-current") { copyText(selectedContent().body); return; }
        if (a === "copy-text-custom") { copyText(t.dataset.text); return; }
        if (a === "copy-brief-template") { copyText("Ниша:\nОффер:\nАудитория:\nБоль:\nФакт/Доказательство:"); return; }
        if (a === "refine-pain") { refineText("amplify-pain"); return; }
        if (a === "refine-proof") { refineText("add-proof"); return; }
        if (a === "refine-shorten") { refineText("shorten"); return; }
        if (a === "refine-rsy") { refineText("adapt-rsy"); return; }
        if (a === "refine-reels") { refineText("adapt-reels"); return; }
        if (a === "clear-workspace-all") {
          state.ideas = []; state.queue = []; state.media = []; state.logs = []; state.critic = null;
          state.projects = [{ id: "p_1", name: "Новый", briefText: "", niche: "", offer: "", audience: "", pain: "", proof: "", common: "", tone: "", details: "", price: "", timelines: "", warranty: "", geo: "", landingPage: "", awareness: "Теплый", fear: "", reason: "", facts: "", goal: "", nextStep: "", leadMagnet: "", stopWords: "", competitors: "", advantages: "" }]; state.activeProjectId = "p_1";
          render(); showToast("Очищено"); return;
        }
      });

      document.addEventListener("input", (e) => {
        const t = e.target;
        if (t.matches('[data-action="project-input"]')) { activeProject()[t.name] = t.value; saveState(); }
        if (t.matches('[data-action="setting-input"]')) { state.settings[t.name] = t.value; saveState(); }
        if (t.matches('[data-action="planner-input"]')) { ensurePlanner()[t.name] = t.value; saveState(); }
        if (t.matches('[data-action="edit-content"]')) {
          const idea = selectedIdea(); if (!idea) return;
          if (!idea.formats) idea.formats = {};
          if (!idea.formats[state.activePlatform]) idea.formats[state.activePlatform] = { headline: "", body: "", tags: "" };
          idea.formats[state.activePlatform][t.dataset.field] = t.value;
          if (t.dataset.field === "headline") idea.title = t.value;
          saveState();
        }
      });

      document.addEventListener("change", (e) => {
        const t = e.target;
        if (t.matches('[data-action="apply-template-select"]')) { applyTemplateById(t.value); render(); }
        if (t.matches('[data-action="select-media"]')) { state.selectedMediaId = t.value; saveState(); }
      });
    });
  </script>
</body>

</html>
