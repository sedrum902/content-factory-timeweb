<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Контент-завод</title>
  <meta name="description" content="Контент-завод: AI-генерация идей, медиа, очередь и публикация в Telegram." />

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap");

    :root {
      --bg: #070710;
      --bg-2: #0b0e1b;
      --card: rgba(255,255,255,.075);
      --card-strong: rgba(255,255,255,.105);
      --glass: rgba(7,7,16,.74);
      --line: rgba(255,255,255,.14);
      --line-strong: rgba(255,255,255,.24);
      --text: rgba(255,255,255,.94);
      --muted: rgba(255,255,255,.62);
      --soft: rgba(255,255,255,.42);
      --white: #fff;
      --black: #070710;
      --blue: #6388ff;
      --cyan: #45d3ff;
      --green: #36e89b;
      --yellow: #ffd86f;
      --red: #ff4268;
      --radius: 28px;
      --shadow: 0 26px 90px rgba(0,0,0,.44);
      --font: "Inter", Arial, sans-serif;
      --container: 1460px;
      --pad: clamp(18px, 2vw, 32px);
      --gap: clamp(14px, 1.5vw, 22px);
      --gap-sm: 10px;
      --fg: #ffffff;
      --fast: .18s ease;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 8%, rgba(99,136,255,.34), transparent 38%),
        radial-gradient(circle at 90% 14%, rgba(255,66,104,.20), transparent 34%),
        radial-gradient(circle at 50% 92%, rgba(69,211,255,.19), transparent 42%),
        linear-gradient(180deg, #070710 0%, #090c18 52%, #070710 100%);
      color: var(--text);
      font-family: var(--font);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,.075) 1px, transparent 0);
      background-size: 34px 34px;
      mask-image: linear-gradient(180deg, rgba(0,0,0,.95), rgba(0,0,0,.42));
      opacity: .46;
    }

    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    button:disabled { opacity: .55; cursor: not-allowed; transform: none !important; }
    a { color: inherit; }

    .auth, .app, .modal-root, .toast { position: relative; z-index: 1; }

    .shell {
      width: min(var(--container), calc(100% - clamp(28px, 5vw, 76px)));
      margin: 0 auto;
    }

    .auth {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
    }

    .auth-card, .panel, .mini-panel, .modal-card {
      border: 1px solid var(--line);
      background: var(--card);
      backdrop-filter: blur(24px);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      min-width: 0;
      overflow: hidden;
    }

    .auth-card {
      width: min(540px, 100%);
      padding: clamp(24px, 4vw, 44px);
      border-color: var(--line-strong);
      position: relative;
    }

    .auth-card::after {
      content: "";
      position: absolute;
      inset: -2px;
      z-index: -1;
      border-radius: calc(var(--radius) + 2px);
      background: linear-gradient(135deg, rgba(99,136,255,.38), rgba(69,211,255,.28));
      filter: blur(14px);
      opacity: .7;
    }

    .app { display: none; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 14px 0 12px;
      background: linear-gradient(180deg, rgba(7,7,16,.96), rgba(7,7,16,.78) 70%, transparent);
      backdrop-filter: blur(22px);
    }

    .topbar-inner {
      display: grid;
      grid-template-columns: minmax(170px, max-content) minmax(360px, 1fr) minmax(130px, 260px);
      gap: 12px;
      align-items: center;
      min-width: 0;
    }

    .brand { min-width: 0; overflow: hidden; }
    .brand-kicker {
      font-size: 11px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--soft);
      font-weight: 900;
      white-space: nowrap;
    }

    .brand-title {
      margin-top: 4px;
      font-size: clamp(21px, 2vw, 30px);
      font-weight: 900;
      letter-spacing: -.06em;
      line-height: 1;
      white-space: nowrap;
    }

    .nav {
      display: flex;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      border-radius: 24px;
      overflow-x: auto;
      scrollbar-width: thin;
    }

    .nav-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border: 0;
      border-radius: 17px;
      min-height: 42px;
      padding: 10px 14px;
      background: transparent;
      color: rgba(255,255,255,.66);
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
      transition: .18s ease;
    }

    .nav-btn:hover { background: rgba(255,255,255,.09); color: #fff; }
    .nav-btn.active {
      background: linear-gradient(135deg, #fff, rgba(255,255,255,.90));
      color: var(--black);
      box-shadow: 0 10px 28px rgba(255,255,255,.16);
    }
    .nav-btn svg { flex: 0 0 auto; }

    .account-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      max-width: 260px;
      justify-content: flex-start;
      padding: 10px 12px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.72);
      font-size: 12px;
      font-weight: 800;
      overflow: hidden;
    }

    .account-pill span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .main { padding: clamp(18px, 2vw, 34px) 0 78px; }
    .pad { padding: var(--pad); }

    .grid-hero {
      display: grid;
      grid-template-columns: minmax(0, 1.42fr) minmax(320px, .8fr);
      gap: var(--gap);
      align-items: stretch;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(300px, .68fr) minmax(0, 1.55fr);
      gap: var(--gap);
      align-items: start;
    }

    .auto {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(290px, 100%), 1fr));
      gap: var(--gap);
    }

    .auto-tight {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(210px, 100%), 1fr));
      gap: 12px;
    }

    .stack { display: grid; gap: var(--gap); }
    .sticky { position: sticky; top: 104px; }

    h1, h2, h3, p { margin-top: 0; }

    .kicker {
      margin-bottom: 10px;
      color: var(--soft);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .title-xl, .title, .auth-title {
      margin: 0;
      font-weight: 900;
      letter-spacing: -.065em;
      text-wrap: balance;
    }

    .auth-title { font-size: clamp(39px, 8vw, 66px); line-height: .9; }
    .title-xl { font-size: clamp(44px, 6.2vw, 84px); line-height: .91; max-width: 980px; }
    .title { font-size: clamp(25px, 3vw, 39px); line-height: 1.03; }
    .title-sm { margin: 0; font-size: 18px; line-height: 1.15; font-weight: 900; letter-spacing: -.035em; }

    .lead, .text, .auth-text {
      color: var(--muted);
      line-height: 1.7;
    }

    .lead { margin: 22px 0 0; max-width: 820px; font-size: clamp(16px, 1.35vw, 19px); }
    .text { margin: 9px 0 0; font-size: 14px; }
    .auth-text { margin: 16px 0 24px; font-size: 15px; }

    .row { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 22px; }

    .badge, .chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 11px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,.22);
      color: rgba(255,255,255,.72);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .badge { margin-bottom: 22px; }
    .chip.ok { background: rgba(54,232,155,.12); color: #c9ffe6; border-color: rgba(54,232,155,.24); }
    .chip.warn { background: rgba(255,216,111,.12); color: #ffe6a1; border-color: rgba(255,216,111,.24); }
    .chip.bad { background: rgba(255,66,104,.12); color: #ffd5dd; border-color: rgba(255,66,104,.26); }
    .chip.info { background: rgba(69,211,255,.12); color: #c9f5ff; border-color: rgba(69,211,255,.24); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 48px;
      padding: 13px 17px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,.08);
      color: #fff;
      font-size: 14px;
      font-weight: 900;
      text-decoration: none;
      line-height: 1.1;
      user-select: none;
      transition: .2s ease;
    }

    .btn:hover { transform: translateY(-1px); border-color: rgba(255,255,255,.28); background: rgba(255,255,255,.12); }
    .btn.primary { border-color: rgba(99,136,255,.7); background: linear-gradient(135deg, #6388ff, #45d3ff); box-shadow: 0 14px 38px rgba(99,136,255,.27); }
    .btn.primary:hover { box-shadow: 0 20px 48px rgba(99,136,255,.38); }
    .btn.green { border-color: rgba(54,232,155,.32); background: rgba(54,232,155,.13); color: #d6ffec; }
    .btn.danger { border-color: rgba(255,66,104,.32); background: rgba(255,66,104,.14); color: #ffd8df; }
    .btn.small { min-height: 38px; padding: 9px 12px; border-radius: 14px; font-size: 12px; }
    .btn.icon-only { width: 42px; min-height: 42px; padding: 0; border-radius: 15px; }
    .btn svg { flex: 0 0 auto; }

    .form { display: grid; gap: 14px; }
    .field { display: grid; gap: 8px; min-width: 0; }
    .label { color: var(--soft); font-size: 11px; font-weight: 900; letter-spacing: .14em; text-transform: uppercase; }

    .input, .textarea, .select {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(0,0,0,.27);
      color: #fff;
      outline: none;
      padding: 13px 14px;
      font-size: 14px;
      font-weight: 650;
      transition: .18s ease;
    }

    .textarea { min-height: 150px; resize: vertical; line-height: 1.65; }
    .select { appearance: none; background-image: linear-gradient(45deg, transparent 50%, rgba(255,255,255,.65) 50%), linear-gradient(135deg, rgba(255,255,255,.65) 50%, transparent 50%); background-position: calc(100% - 18px) 50%, calc(100% - 13px) 50%; background-size: 5px 5px, 5px 5px; background-repeat: no-repeat; padding-right: 38px; }
    .input:focus, .textarea:focus, .select:focus { border-color: rgba(69,211,255,.55); box-shadow: 0 0 0 4px rgba(69,211,255,.08); background: rgba(0,0,0,.35); }

    .password-wrap { position: relative; display: flex; align-items: center; }
    .password-wrap .input { padding-right: 52px; }
    .toggle-secret {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 12px;
      background: transparent;
      color: rgba(255,255,255,.48);
      display: grid;
      place-items: center;
    }
    .toggle-secret:hover { background: rgba(255,255,255,.08); color: #fff; }

    .metric, .soft-card, .idea, .media-card, .queue-card, .project-card {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.055);
      border-radius: 24px;
      min-width: 0;
    }

    .metric { padding: 20px; min-height: 136px; }
    .metric-value { font-size: clamp(26px, 3vw, 34px); font-weight: 900; letter-spacing: -.06em; line-height: 1; word-break: break-word; }
    .metric-label { margin-top: 8px; font-size: 14px; font-weight: 900; }
    .metric-hint { margin-top: 10px; color: var(--soft); font-size: 12px; line-height: 1.55; }

    .soft-card { padding: 18px; }
    .soft-card-head { display: flex; align-items: flex-start; gap: 12px; }
    .icon-box {
      width: 42px;
      height: 42px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      background: rgba(255,255,255,.10);
      color: #fff;
    }

    .notice {
      display: grid;
      gap: 12px;
      border: 1px solid rgba(255,216,111,.24);
      background: linear-gradient(135deg, rgba(255,216,111,.13), rgba(99,136,255,.08));
      border-radius: 24px;
      padding: 18px;
    }

    .hero-steps {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }

    .hero-step {
      flex: 1 1 180px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.055);
      border-radius: 22px;
      padding: 14px;
      min-width: 0;
    }

    .hero-step b {
      display: block;
      font-size: 13px;
      line-height: 1.25;
      font-weight: 900;
    }

    .hero-step span {
      display: block;
      margin-top: 6px;
      color: var(--soft);
      font-size: 12px;
      line-height: 1.45;
      font-weight: 700;
    }

    .planner-strip {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
      scroll-snap-type: x mandatory;
    }

    .calendar-day {
      flex: 1 0 min(320px, 84vw);
      scroll-snap-align: start;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(255,255,255,.052);
      padding: 16px;
      min-width: 0;
    }

    .calendar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .calendar-title {
      font-size: 15px;
      font-weight: 900;
      line-height: 1.2;
    }

    .calendar-items {
      display: grid;
      gap: 9px;
    }

    .calendar-item {
      width: 100%;
      display: block;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.20);
      color: #fff;
      text-align: left;
      border-radius: 18px;
      padding: 12px;
      min-width: 0;
      transition: .18s ease;
    }

    .calendar-item:hover { border-color: rgba(69,211,255,.32); background: rgba(69,211,255,.08); transform: translateY(-1px); }

    .calendar-time {
      color: var(--cyan);
      font-size: 12px;
      font-weight: 900;
    }

    .calendar-copy {
      margin-top: 5px;
      font-size: 13px;
      line-height: 1.35;
      font-weight: 850;
    }

    .calendar-meta {
      margin-top: 7px;
      color: var(--soft);
      font-size: 11px;
      line-height: 1.45;
      font-weight: 700;
    }

    .manual-ai-grid { display: grid; grid-template-columns: minmax(0, 1.1fr) minmax(280px, .9fr); gap: var(--gap); align-items: start; }

    .one-key-box { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 10px; align-items: end; }
    .one-key-status { display: grid; gap: 12px; }
    .one-key-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .ai-examples { display: grid; gap: 10px; }
    .ai-example {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.048);
      border-radius: 20px;
      padding: 14px;
      display: grid;
      gap: 8px;
      min-width: 0;
    }
    .ai-example-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; min-width: 0; }
    .code-token {
      display: block;
      max-width: 100%;
      padding: 9px 10px;
      border-radius: 14px;
      background: rgba(0,0,0,.24);
      border: 1px solid rgba(255,255,255,.09);
      color: rgba(255,255,255,.76);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
      overflow-wrap: anywhere;
      word-break: break-word;
      white-space: normal;
    }
    .help-list { display: grid; gap: 8px; margin: 14px 0 0; padding: 0; list-style: none; }
    .help-list li { color: var(--muted); font-size: 13px; line-height: 1.55; overflow-wrap: anywhere; }

    .title, .title-xl, .title-sm, .lead, .text, .item-title, .item-sub, .card-title, .card-text, .metric-value, .metric-hint, .chip, .badge, .btn, .nav-btn, .account-pill, .input, .textarea, .select, .modal-pre, .empty, .code-token, .label {
      max-width: 100%;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .input, .textarea, .select, .panel, .pad, .stack, .auto, .layout, .grid-hero, .manual-ai-grid { min-width: 0; }
    .btn { white-space: normal; text-align: center; min-width: 0; }
    .input::placeholder, .textarea::placeholder { color: rgba(255,255,255,.34); }

    .ideas { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(250px, 100%), 1fr)); gap: 12px; }
    .idea {
      padding: 17px;
      min-height: 188px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: #fff;
      text-align: left;
      transition: .18s ease;
    }
    .idea:hover { transform: translateY(-1px); border-color: rgba(255,255,255,.28); background: rgba(255,255,255,.085); }
    .idea.active { background: linear-gradient(135deg, #fff, #f2f8ff); color: #080914; border-color: rgba(99,136,255,.8); box-shadow: 0 18px 48px rgba(99,136,255,.22); }
    .idea .pill { background: rgba(255,255,255,.10); }
    .idea.active .pill { background: #090b15; color: #fff; }
    .idea-title { margin-top: 14px; font-size: clamp(17px, 1.4vw, 20px); line-height: 1.14; font-weight: 900; letter-spacing: -.04em; text-wrap: balance; }
    .idea-foot { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 18px; }

    .platforms { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; }
    .platform {
      min-width: 175px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255,255,255,.06);
      color: #fff;
      padding: 12px;
      text-align: left;
      transition: .18s ease;
    }
    .platform:hover, .platform.active { border-color: rgba(69,211,255,.36); background: rgba(69,211,255,.10); }
    .platform.active { color: #07101a; background: linear-gradient(135deg, #fff, #eafcff); }
    .platform-title { display: block; font-size: 14px; font-weight: 900; }
    .platform-sub { display: block; margin-top: 4px; color: rgba(255,255,255,.45); font-size: 11px; font-weight: 800; }
    .platform.active .platform-sub { color: rgba(7,16,26,.58); }

    .output-box {
      border: 1px solid var(--line);
      border-radius: 26px;
      background: rgba(0,0,0,.22);
      padding: 18px;
      min-width: 0;
    }

    .list { display: grid; gap: 12px; }
    .item-row, .media-card, .queue-card, .project-card { padding: 15px; display: flex; gap: 12px; align-items: flex-start; }
    .item-body { min-width: 0; flex: 1; }
    .item-title { font-size: 14px; line-height: 1.28; font-weight: 900; word-break: break-word; }
    .item-sub { margin-top: 6px; color: var(--soft); font-size: 12px; line-height: 1.55; font-weight: 700; word-break: break-word; }
    .item-foot { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: space-between; }

    .preview {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,.045);
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--soft);
      font-size: 13px;
      text-align: center;
    }
    .preview img, .preview video { width: 100%; height: 100%; object-fit: cover; display: block; }

    .empty {
      padding: 24px;
      border: 1px dashed rgba(255,255,255,.18);
      border-radius: 24px;
      background: rgba(255,255,255,.04);
      color: rgba(255,255,255,.52);
      font-size: 14px;
      line-height: 1.65;
    }

    .log { border-left: 3px solid rgba(255,255,255,.18); padding: 13px 14px; border-radius: 16px; background: rgba(0,0,0,.23); }
    .log.ok { border-left-color: var(--green); }
    .log.bad { border-left-color: var(--red); }
    .log.warn { border-left-color: var(--yellow); }
    .log-time { color: rgba(255,255,255,.36); font-size: 11px; font-weight: 800; }
    .log-text { margin-top: 7px; color: rgba(255,255,255,.76); font-size: 13px; line-height: 1.55; font-weight: 650; }
    .log-meta { margin-top: 8px; max-height: 180px; overflow: auto; white-space: pre-wrap; color: rgba(255,255,255,.45); font-size: 12px; line-height: 1.55; }

    .modal-root { position: relative; z-index: 1000; }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 1000;
      padding: 18px;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(16px);
      display: grid;
      place-items: center;
    }
    .modal-card { width: min(920px, 100%); max-height: min(88vh, 820px); display: flex; flex-direction: column; background: radial-gradient(circle at 0 0, rgba(99,136,255,.20), transparent 34%), #0b0d18; border-color: var(--line-strong); }
    .modal-head { padding: 18px 20px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .modal-title { margin: 0; font-size: clamp(22px, 3vw, 34px); line-height: 1.04; letter-spacing: -.055em; font-weight: 900; }
    .modal-body { padding: 20px; overflow: auto; }
    .modal-pre { white-space: pre-wrap; border: 1px solid var(--line); background: rgba(255,255,255,.055); border-radius: 20px; padding: 16px; color: rgba(255,255,255,.82); line-height: 1.72; font-size: 14px; margin: 0; word-break: break-word; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      z-index: 2000;
      transform: translateX(-50%) translateY(18px);
      opacity: 0;
      pointer-events: none;
      min-width: min(520px, calc(100% - 28px));
      max-width: min(720px, calc(100% - 28px));
      padding: 13px 16px;
      border-radius: 999px;
      background: #fff;
      color: var(--black);
      box-shadow: 0 18px 50px rgba(0,0,0,.35);
      font-size: 14px;
      font-weight: 900;
      text-align: center;
      transition: .22s ease;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .loading-line {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 3000;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, var(--blue), var(--cyan), var(--green));
      transform-origin: left;
      animation: loadingPulse 1.1s ease-in-out infinite;
      display: none;
    }
    .loading-line.show { display: block; }
    @keyframes loadingPulse { 0% { transform: scaleX(.08); opacity: .55; } 50% { transform: scaleX(.72); opacity: 1; } 100% { transform: scaleX(1); opacity: .55; } }

    @media (max-width: 1280px) {
      .topbar-inner { grid-template-columns: minmax(0, 1fr) minmax(130px, 260px); align-items: center; }
      .nav { grid-column: 1 / -1; order: 3; }
    }

    @media (max-width: 1160px) {
      .topbar-inner { grid-template-columns: 1fr; align-items: stretch; }
      .account-pill { max-width: 100%; }
      .grid-hero, .layout { grid-template-columns: 1fr; }
      .sticky { position: static; }
    }

    @media (max-width: 760px) {
      .shell { width: min(100% - 28px, var(--container)); }
      .topbar { padding-top: 10px; }
      .nav { padding: 7px; border-radius: 20px; }
      .nav-btn { min-width: 54px; padding: 10px 11px; }
      .nav-btn span { display: none; }
      .brand-title { white-space: normal; }
      .manual-ai-grid { grid-template-columns: 1fr; }
      .one-key-box { grid-template-columns: 1fr; }
      .title-xl { font-size: clamp(38px, 13vw, 56px); }
      .pad { padding: 18px; }
      .actions { flex-direction: column; }
      .btn { width: 100%; }
      .item-row, .media-card, .queue-card, .project-card { flex-direction: column; }
      .ideas, .auto.mobile-scroll { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; padding-bottom: 6px; }
      .idea, .auto.mobile-scroll > * { min-width: min(86vw, 360px); scroll-snap-align: start; }
      .hero-step { flex-basis: min(84vw, 320px); }
      .modal-body { padding: 16px; }
    }
  </style>
</head>

<body>
  <div class="loading-line" id="loadingLine"></div>

  <section class="auth" id="authScreen">
    <div class="auth-card">
      <div class="kicker">Личный аккаунт</div>
      <h1 class="auth-title">Контент-завод</h1>
      <p class="auth-text" id="authText">Войди в аккаунт для доступа к инструментам генерации.</p>

      <form class="form" id="authForm">
        <label class="field">
          <span class="label">Email или Логин</span>
          <input class="input" id="emailInput" type="text" placeholder="you@example.com или kubik" required />
        </label>

        <label class="field">
          <span class="label">Пароль</span>
          <div class="password-wrap">
            <input class="input" id="passwordInput" type="password" placeholder="Введите пароль" autocomplete="current-password" required />
            <button class="toggle-secret" type="button" data-auth-password-toggle aria-label="Показать пароль"></button>
          </div>
        </label>

        <button class="btn primary" id="authSubmitBtn" type="submit"></button>
        <button class="btn" id="authModeToggle" type="button" style="display: none;"></button>
        <div class="notice" id="authError" style="display:none;"></div>
      </form>
    </div>
  </section>

  <div class="app" id="app">
    <div class="topbar">
      <div class="shell topbar-inner">
        <div class="brand">
          <div class="brand-kicker">Умный генератор</div>
          <div class="brand-title">Контент-завод</div>
        </div>
        <nav class="nav" id="nav"></nav>
        <div class="account-pill" id="accountPill"></div>
      </div>
    </div>

    <main class="shell main" id="main"></main>
  </div>

  <div class="modal-root" id="modalRoot"></div>
  <div class="toast" id="toast">Готово</div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const TOKEN_KEY = "cf_full_token_v2";
      const USER_KEY = "cf_full_user_v2";
      const STORE_KEY = "cf_ui_clean_state_v1";
      const SECRET_FIELDS = ["openaiApiKey", "telegramBotToken"];

      const el = {
        authScreen: document.getElementById("authScreen"),
        authForm: document.getElementById("authForm"),
        emailInput: document.getElementById("emailInput"),
        passwordInput: document.getElementById("passwordInput"),
        authText: document.getElementById("authText"),
        authSubmitBtn: document.getElementById("authSubmitBtn"),
        authModeToggle: document.getElementById("authModeToggle"),
        authError: document.getElementById("authError"),
        app: document.getElementById("app"),
        nav: document.getElementById("nav"),
        main: document.getElementById("main"),
        modalRoot: document.getElementById("modalRoot"),
        toast: document.getElementById("toast"),
        loadingLine: document.getElementById("loadingLine"),
        accountPill: document.getElementById("accountPill")
      };

      const icons = {
        factory: icon("M3 21h18M6 18V6a3 3 0 0 1 3-3h6a3 3 0 0 1 3 3v12M9 9h6M9 13h6"),
        media: icon("M4 5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v14H4z M8 9h.01 M4 15l4-4 3 3 3-3 6 6"),
        queue: icon("M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"),
        projects: icon("M3 6a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"),
        settings: icon("M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 0 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9c.2.6.8 1 1.5 1H21a2 2 0 0 1 0 4h-.1c-.7 0-1.3.4-1.5 1z"),
        logs: icon("M4 19V5M4 19h16M8 16v-5M12 16V8M16 16v-8"),
        logout: icon("M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4 M16 17l5-5-5-5 M21 12H9"),
        spark: icon("M12 3l1.7 5.2L19 10l-5.3 1.8L12 17l-1.7-5.2L5 10l5.3-1.8z"),
        key: icon("M21 2l-2 2M11.4 11.6a5 5 0 1 1-2.8-2.8L21 2v5h-5v5h-4.6z"),
        send: icon("M22 2L11 13M22 2l-7 20-4-9-9-4z"),
        copy: icon("M8 8h10v12H8z M6 16H4V4h12v2"),
        close: icon("M18 6L6 18M6 6l12 12"),
        upload: icon("M12 16V4M7 9l5-5 5 5M4 20h16"),
        trash: icon("M3 6h18M8 6V4h8v2M6 6l1 15h10l1-15"),
        eye: icon("M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"),
        eyeOff: icon("M17.9 17.9A10.5 10.5 0 0 1 12 20C5 20 1 12 1 12a18.5 18.5 0 0 1 5.1-5.9M10 4.2A9.3 9.3 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.2 3.2M1 1l22 22"),
        check: icon("M20 6L9 17l-5-5")
      };

      const tabs = [
        ["factory", "Завод", icons.factory],
        ["media", "Медиа", icons.media],
        ["queue", "Очередь", icons.queue],
        ["projects", "Проекты", icons.projects],
        ["settings", "Настройки", icons.settings],
        ["logs", "Журнал", icons.logs],
        ["logout", "Выход", icons.logout]
      ];

      const platforms = {
        telegram: { name: "Telegram", short: "готовый пост", icon: "TG" },
        instagram: { name: "Instagram", short: "Reels-сценарий", icon: "IG" },
        youtube: { name: "YouTube", short: "Shorts-сценарий", icon: "YT" }
      };

      const defaultState = {
        activeTab: "factory",
        activeProjectId: "p_1",
        activePlatform: "telegram",
        selectedIdeaId: "",
        selectedMediaId: "",
        busy: false,
        secretVisible: {},
        settings: {
          model: "",
          ideaCount: "3",
          style: "острый, экспертный, без воды",
          objective: "заявки",
          openaiApiKey: "",
          telegramBotToken: "",
          telegramChatId: "",
          instagramAccessToken: "",
          instagramUserId: "",
          instagramReady: false,
          youtubeConnected: false,
          youtubeChannelId: "",
          youtubeOAuthEnabled: false,
          backendStatus: "не проверен"
        },
        planner: {
          publishDate: "",
          publishTime: "",
          placement: "Telegram-канал",
          goal: "получить заявку",
          reason: "",
          formatNote: ""
        },
        projects: [
          {
            id: "p_1",
            name: "Новый проект",
            niche: "",
            offer: "",
            audience: "",
            pain: "",
            common: "",
            proof: "",
            tone: "",
            status: "активный"
          }
        ],
        ideas: [],
        media: [],
        queue: [],
        logs: []
      };

      let authMode = "login";
      let state = loadState();

      init();

      function init() {
        ensurePlanner();
        renderAuthMode();
        el.authForm.addEventListener("submit", submitAuth);
        el.authModeToggle.addEventListener("click", toggleAuthMode);
        document.querySelector("[data-auth-password-toggle]")?.addEventListener("click", toggleAuthPassword);

        if (token()) {
          showApp();
          fetchConfig();
          checkBackend(false);
        } else {
          showAuth();
        }
      }

      function icon(path) {
        return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.35" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="${path}"></path></svg>`;
      }

      function token() { return localStorage.getItem(TOKEN_KEY) || ""; }
      function currentEmail() { return localStorage.getItem(USER_KEY) || ""; }
      function storageKey() { return `${STORE_KEY}_${(currentEmail() || "guest").toLowerCase().replace(/[^a-z0-9@._-]+/g, "_")}`; }
      function clone(value) { return JSON.parse(JSON.stringify(value)); }

      function loadState() {
        try {
          const raw = localStorage.getItem(storageKey());
          if (!raw) return clone(defaultState);
          const parsed = JSON.parse(raw);
          const merged = { ...clone(defaultState), ...parsed };
          merged.settings = { ...clone(defaultState.settings), ...(parsed.settings || {}) };
          merged.planner = { ...clone(defaultState.planner), ...(parsed.planner || {}) };
          if (!merged.planner.publishDate) merged.planner.publishDate = todayInputValue();
          if (!merged.planner.publishTime) merged.planner.publishTime = nextHourInputValue();
          
          merged.settings.openaiApiKey = "";
          merged.settings.telegramBotToken = "";
          merged.secretVisible = parsed.secretVisible || {};
          return merged;
        } catch {
          return clone(defaultState);
        }
      }

      function saveState() {
        const data = clone(state);
        SECRET_FIELDS.forEach((field) => { if (data.settings) data.settings[field] = ""; });
        localStorage.setItem(storageKey(), JSON.stringify(data));
      }

      function makeIdea({ id, title, angle, score, pillar, telegram, instagram, youtube, tags = "" }) {
        return {
          id: id || uid("i"),
          title: String(title || "Идея").trim(),
          angle: String(angle || "AI-угол").trim(),
          score: Number(score || 90),
          pillar: String(pillar || "Контент").trim(),
          status: "Готово",
          formats: {
            telegram: { format: "Пост", headline: title || "Идея", body: telegram || "", tags },
            instagram: { format: "Reels, 30-45 секунд", headline: title || "Идея", body: instagram || telegram || "", tags },
            youtube: { format: "Shorts, 30-45 секунд", headline: title || "Идея", body: youtube || telegram || "", tags }
          }
        };
      }

      function showAuth() {
        el.authScreen.style.display = "grid";
        el.app.style.display = "none";
        setTimeout(() => el.emailInput.focus(), 80);
      }

      function showApp() {
        el.authScreen.style.display = "none";
        el.app.style.display = "block";
        render();
      }

      function toggleAuthMode() {
        authMode = authMode === "login" ? "register" : "login";
        setAuthError("");
        renderAuthMode();
      }

      function renderAuthMode() {
        const isRegister = authMode === "register";
        el.authText.textContent = isRegister
          ? "Создай аккаунт, чтобы начать пользоваться контент-заводом."
          : "Войди в аккаунт для доступа к инструментам генерации.";
        el.authSubmitBtn.textContent = isRegister ? "Зарегистрироваться" : "Войти";
        el.authModeToggle.textContent = isRegister ? "У меня уже есть аккаунт" : "Создать аккаунт";
        el.passwordInput.autocomplete = isRegister ? "new-password" : "current-password";
        document.querySelector("[data-auth-password-toggle]").innerHTML = icons.eye;
      }

      function toggleAuthPassword() {
        const show = el.passwordInput.type === "password";
        el.passwordInput.type = show ? "text" : "password";
        document.querySelector("[data-auth-password-toggle]").innerHTML = show ? icons.eyeOff : icons.eye;
      }

      function setAuthError(text) {
        if (!text) {
          el.authError.style.display = "none";
          el.authError.innerHTML = "";
          return;
        }
        el.authError.style.display = "grid";
        el.authError.innerHTML = `<strong>${escapeHtml(text)}</strong>`;
      }

      async function submitAuth(event) {
        event.preventDefault();
        setAuthError("");
        setBusy(true);

        try {
          const email = el.emailInput.value.trim();
          const password = el.passwordInput.value;
          const endpoint = "/api/auth/login";
          const data = await request(endpoint, { method: "POST", public: true, body: { email, password } });

          localStorage.setItem(TOKEN_KEY, data.token);
          localStorage.setItem(USER_KEY, data.user?.email || email);
          state = loadState();
          showApp();
          await fetchConfig();
          await checkBackend(false);
        } catch (error) {
          setAuthError(cleanError(error.message));
        } finally {
          setBusy(false);
        }
      }

      function logout() {
        localStorage.removeItem(TOKEN_KEY);
        state = loadState();
        el.passwordInput.value = "";
        showAuth();
      }

      async function request(path, options = {}) {
        const headers = {};
        let body = options.body;

        if (!(body instanceof FormData)) {
          headers["Content-Type"] = "application/json";
          body = body ? JSON.stringify(body) : undefined;
        }

        if (!options.public) headers.Authorization = "Bearer " + token();

        const controller = new AbortController();
        const timeoutMs = options.timeoutMs || (path === "/api/generate" ? 180000 : 30000);
        const timer = setTimeout(() => controller.abort(), timeoutMs);

        let response;
        try {
          response = await fetch(path, { method: options.method || "GET", headers, body, signal: controller.signal });
        } catch (error) {
          if (error?.name === "AbortError") {
            throw new Error(`Запрос не ответил за ${Math.round(timeoutMs / 1000)} секунд. Попробуй запустить ещё раз.`);
          }
          throw error;
        } finally {
          clearTimeout(timer);
        }

        const text = await response.text();
        let data;
        try { data = text ? JSON.parse(text) : {}; } catch { data = { raw: text }; }

        if (response.status === 401 && !options.public) {
          logout();
          throw new Error("Сессия истекла. Войди заново.");
        }

        if (!response.ok) throw new Error(data.error || data.message || data.raw || "Ошибка запроса");
        return data;
      }

      function setBusy(value) {
        state.busy = Boolean(value);
        el.loadingLine.classList.toggle("show", state.busy);
        document.querySelectorAll("button").forEach((button) => {
          if (button.dataset.allowDuringBusy === "true") return;
          button.disabled = state.busy;
        });
      }

      function showToast(text) {
        el.toast.textContent = text;
        el.toast.classList.add("show");
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(() => el.toast.classList.remove("show"), 1800);
      }

      function scrollToTop() {
        requestAnimationFrame(() => window.scrollTo({ top: 0, behavior: "smooth" }));
      }

      function addLog(type, text, meta = "") {
        state.logs.unshift({ id: uid("log"), type, text, meta, time: new Date().toLocaleString("ru-RU") });
        state.logs = state.logs.slice(0, 90);
        saveState();
      }

      function uid(prefix) { return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 7)}`; }
      function pad2(value) { return String(value).padStart(2, "0"); }
      function todayInputValue(offset = 0) {
        const date = new Date();
        date.setDate(date.getDate() + offset);
        return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`;
      }
      function nextHourInputValue() {
        const date = new Date();
        date.setMinutes(date.getMinutes() > 30 ? 0 : 30, 0, 0);
        if (date.getMinutes() === 0) date.setHours(date.getHours() + 1);
        return `${pad2(date.getHours())}:${pad2(date.getMinutes())}`;
      }
      function ensurePlanner() {
        if (!state.planner) state.planner = clone(defaultState.planner);
        if (!state.planner.publishDate) state.planner.publishDate = todayInputValue();
        if (!state.planner.publishTime) state.planner.publishTime = nextHourInputValue();
        return state.planner;
      }
      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function cleanError(message) {
        const text = String(message || "Ошибка");
        if (text.includes("API_KEY_INVALID") || text.includes("api key not valid") || text.includes("401") || text.includes("unauthorized") || text.includes("Forbidden")) {
          return "Timeweb-токен отклонен. Обратитесь к администратору для проверки серверной конфигурации.";
        }
        if (text.toLowerCase().includes("connection error") || text.toLowerCase().includes("fetch")) {
          return "Ошибка подключения: сервер не смог связаться с Timeweb-агентом.";
        }
        if (/не ответил за|timeout|timed out|aborted/i.test(text)) {
          return "Сервис ИИ отвечает слишком долго. Попробуйте запустить генерацию снова.";
        }
        if (text.includes("TIMEWEB_API_KEY") || text.includes("TIMEWEB_AGENT_ID") || text.toLowerCase().includes("api key") || text.toLowerCase().includes("подключение не настроено")) {
          return "ИИ-подключение не настроено на сервере. Обратитесь к администратору сайта.";
        }
        if (text.includes("429") || text.includes("limit") || text.toLowerCase().includes("rate limit")) {
          return "Превышены лимиты запросов к ИИ. Подождите немного и попробуйте снова.";
        }
        return text;
      }

      function activeProject() { return state.projects.find((p) => p.id === state.activeProjectId) || state.projects[0]; }
      function selectedIdea() { return state.ideas.find((idea) => idea.id === state.selectedIdeaId) || state.ideas[0] || null; }
      function selectedContent() {
        const idea = selectedIdea();
        if (!idea) return { format: "Формат", headline: "Нет идей", body: "Сначала сгенерируй идеи.", tags: "" };
        const content = idea.formats?.[state.activePlatform] || idea.formats?.telegram;
        return content || { format: platforms[state.activePlatform]?.name || "Формат", headline: idea.title, body: idea.title, tags: "" };
      }

      function render() {
        renderNav();
        renderAccount();
        renderMain();
        saveState();
      }

      function renderNav() {
        el.nav.innerHTML = tabs.map(([id, label, svg]) => `
          <button class="nav-btn ${state.activeTab === id ? "active" : ""}" data-action="${id === "logout" ? "logout" : "tab"}" data-tab="${id}" title="${escapeHtml(label)}">
            ${svg}<span>${escapeHtml(label)}</span>
          </button>
        `).join("");
      }

      function renderAccount() {
        const keyReady = Boolean(state.settings.openaiApiKey);
        el.accountPill.innerHTML = `${icons.key}<span>${escapeHtml(currentEmail() || "аккаунт")}</span><span class="chip ${keyReady ? "ok" : "warn"}" style="padding:4px 8px;">${keyReady ? "AI подключён" : "нет ключа"}</span>`;
      }

      function renderMain() {
        const views = {
          factory: renderFactory,
          media: renderMedia,
          queue: renderQueue,
          projects: renderProjects,
          settings: renderSettings,
          logs: renderLogs
        };
        el.main.innerHTML = (views[state.activeTab] || renderFactory)();
      }

      function renderFactory() {
        const project = activeProject();
        const content = selectedContent();
        const planner = ensurePlanner();
        const lastBad = state.logs.find((log) => log.type === "bad");
        const shouldShowRegionNotice = lastBad?.text?.includes("Timeweb") || lastBad?.text?.includes("API_KEY_INVALID") || lastBad?.text?.includes("ключ");

        return `
          <section class="grid-hero">
            <div class="panel">
              <div class="pad">
                <div class="badge">${icons.spark} Генерация под Telegram, Reels и Shorts</div>

      function renderCalendar() {
        const dates = uniqueTexts([
          todayInputValue(0),
          todayInputValue(1),
          todayInputValue(2),
          ...state.queue.map((item) => item.publishDate || datePart(item.scheduledAt) || todayInputValue())
        ]).slice(0, 7);

        return `
          <div class="planner-strip">
            ${dates.map((date) => renderCalendarDay(date)).join("")}
          </div>
        `;
      }

      function renderCalendarDay(date) {
        const posts = state.queue
          .filter((item) => (item.publishDate || datePart(item.scheduledAt) || todayInputValue()) === date)
          .sort((a, b) => String(a.publishTime || "").localeCompare(String(b.publishTime || "")));
        const label = date === todayInputValue() ? "Сегодня" : formatDateHuman(date);
        return `
          <div class="calendar-day">
            <div class="calendar-head">
              <div>
                <div class="calendar-title">${escapeHtml(label)}</div>
                <div class="item-sub">${escapeHtml(date)}</div>
              </div>
              <span class="chip info">${posts.length} шт.</span>
            </div>
            <div class="calendar-items">
              ${posts.length ? posts.map(renderCalendarItem).join("") : `<div class="empty" style="padding:14px; border-radius:18px;">Свободно</div>`}
            </div>
          </div>
        `;
      }

      function renderCalendarItem(item) {
        return `
          <button class="calendar-item" data-action="open-queue" data-id="${escapeHtml(item.id)}" style="color:#fff; text-align:left;">
            <div class="calendar-time">${escapeHtml(item.publishTime || "без времени")} · ${escapeHtml(platforms[item.platform]?.name || item.platform)}</div>
            <div class="calendar-copy">${escapeHtml(shorten(item.title, 72))}</div>
            <div class="calendar-meta">${escapeHtml(item.goal || "цель не указана")}${item.reason ? " · " + escapeHtml(shorten(item.reason, 70)) : ""}</div>
          </button>
        `;
      }

      function renderMetric(value, label, hint) {
        return `<div class="metric"><div class="metric-value">${escapeHtml(value)}</div><div class="metric-label">${escapeHtml(label)}</div><div class="metric-hint">${escapeHtml(hint)}</div></div>`;
      }

      function renderNotice(title, text, actionHtml = "") {
        return `<div class="notice"><div><h3 class="title-sm">${escapeHtml(title)}</h3><p class="text">${escapeHtml(text)}</p></div>${actionHtml ? `<div class="actions" style="margin-top:0;">${actionHtml}</div>` : ""}</div>`;
      }

      function renderProjectField(name, label, value, placeholder = "", isLong = false) {
        if (isLong) {
          return `

              <span class="label">${escapeHtml(label)}</span>
              <textarea class="textarea" data-action="project-input" name="${escapeHtml(name)}" placeholder="${escapeHtml(placeholder)}" autocomplete="off" rows="3" style="resize: vertical; width: 100%; min-height: 80px; font-family: inherit; font-size: 14px; padding: 10px 14px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: var(--fg); color-scheme: dark; transition: border-color var(--fast), background-color var(--fast);">${escapeHtml(value || "")}</textarea>
            </label>
          `;
        }
        return `<label class="field"><span class="label">${escapeHtml(label)}</span><input class="input" data-action="project-input" name="${escapeHtml(name)}" value="${escapeHtml(value || "")}" placeholder="${escapeHtml(placeholder)}" autocomplete="off" /></label>`;
      }

        const isLong = ["offer", "audience", "pain", "common", "proof"].includes(name);

      function renderEmpty(text) { return `<div class="empty">${escapeHtml(text)}</div>`; }
      function shorten(text, limit) { const value = String(text || ""); return value.length > limit ? value.slice(0, limit - 1) + "…" : value; }
      function uniqueTexts(list) {
        const seen = new Set();
        return list.filter((item) => {
          const value = String(item || "").trim();
          const key = value.toLowerCase();
          if (!key || seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      }
      function datePart(value) { return String(value || "").slice(0, 10); }
      function formatDateHuman(value) {
        const date = new Date(`${value}T12:00:00`);
        if (Number.isNaN(date.getTime())) return value || "Без даты";
        return date.toLocaleDateString("ru-RU", { day: "numeric", month: "long" });
      }
      function formatBytes(bytes) {
        const n = Number(bytes || 0);
        if (!n) return "0 Б";
        const units = ["Б", "КБ", "МБ", "ГБ"];
        let i = 0, value = n;
        while (value >= 1024 && i < units.length - 1) { value /= 1024; i++; }
        return `${value.toFixed(value >= 10 || i === 0 ? 0 : 1)} ${units[i]}`;
      }

      async function generate() {
        if (!state.settings.openaiApiKey) {
          state.activeTab = "settings";
          addLog("warn", "Генерация не запущена: не настроено ИИ-подключение на сервере.");
          showToast("Сначала настройте ИИ на сервере");
          render();
          return;
        }

        setBusy(true);
        showToast("Запрос к ИИ-серверу...");
        try {
          const data = await request("/api/generate", {
            method: "POST",
            body: {
              project: activeProject(),
              settings: state.settings,
              platform: state.activePlatform,
              planner: ensurePlanner()
            }
          });

          const ideas = Array.isArray(data.ideas) ? data.ideas : [];
          state.ideas = ideas.map((item) => ({ id: uid("i"), ...item, status: item.status || "Готово" }));
          state.selectedIdeaId = state.ideas[0]?.id || "";
          state.activeTab = "factory";
          addLog("ok", "Идеи получены успешно через ИИ.", JSON.stringify(data, null, 2));
          showToast("Идеи готовы");
        } catch (error) {
          const message = cleanError(error.message);
          addLog("bad", "Ошибка генерации: " + message, error.message);
          showToast("Ошибка генерации");
          if (String(error.message).includes("API_KEY_INVALID") || String(error.message).includes("unauthorized") || String(error.message).includes("401") || String(error.message).includes("Forbidden")) {
            openModal("Доступ к ИИ отклонен", "Timeweb отклонил запрос. Обратитесь к администратору для проверки токена и агента.", `<div class="actions"><button class="btn primary" data-action="tab" data-tab="settings">В настройки</button></div>`);
          } else if (String(error.message).toLowerCase().includes("connection error") || String(error.message).toLowerCase().includes("fetch")) {
            openModal("Нет соединения с ИИ", "Сервер не смог подключиться к Timeweb-агенту. Проверьте сеть или доступность сервиса.", `<div class="actions"><button class="btn primary" data-action="tab" data-tab="settings">В настройки</button><button class="btn" data-action="tab" data-tab="logs">Журнал</button></div>`);
          } else if (/не ответил за|timeout|timed out|aborted/i.test(String(error.message))) {
            openModal("ИИ слишком долго отвечает", "Запрос был остановлен по таймауту на сервере. Попробуйте снова или проверьте лимиты.", `<div class="actions"><button class="btn primary" data-action="tab" data-tab="settings">В настройки</button><button class="btn" data-action="tab" data-tab="logs">Журнал</button></div>`);
          } else {
            openModal("Ошибка генерации", message, `<div class="actions"><button class="btn primary" data-action="close-modal">Закрыть</button><button class="btn" data-action="tab" data-tab="logs">Журнал</button></div>`);
          }
        } finally {
          setBusy(false);
          render();
        }
      }

        const post = state.queue.find((item) => item.id === id);
        if (!post) return;
        const media = state.media.find((item) => item.id === post.mediaId) || null;
        post.state = "Публикуется";
        render();

        try {
          const data = await request("/api/publish/" + encodeURIComponent(post.platform), { method: "POST", body: { post, media } });
          post.state = "Опубликовано";
          post.lastResponse = JSON.stringify(data, null, 2);
          addLog("ok", "Публикация отправлена: " + post.title, JSON.stringify(data, null, 2));
          showToast("Опубликовано");
        } catch (error) {
          post.state = "Ошибка";
          post.lastResponse = error.message;
          addLog("bad", "Ошибка публикации: " + error.message, post.title);
          showToast("Ошибка публикации");
        } finally {
          render();
        }

      async function generatePhotoSubmit() {
        const promptEl = document.getElementById("generate-photo-prompt");
        const errorEl = document.getElementById("generate-photo-error");
        const loaderEl = document.getElementById("generate-photo-loader");
        const actionsEl = document.getElementById("generate-photo-actions");
        const textPrompt = promptEl?.value?.trim();

        if (!textPrompt) {
          if (errorEl) {
            errorEl.textContent = "Пожалуйста, введи описание картинки.";
            errorEl.style.display = "block";
          }
          return;
        }

        if (errorEl) errorEl.style.display = "none";
        if (loaderEl) loaderEl.style.display = "flex";
        if (actionsEl) actionsEl.style.display = "none";
        if (promptEl) promptEl.disabled = true;

        try {
          const res = await request("/api/generate-image", {
            method: "POST",
            body: { prompt: textPrompt },
            timeoutMs: 120000
          });

          if (res && res.ok && res.id) {
            state.media.push(res);
            state.selectedMediaId = res.id;
            saveState();
            closeModal();
            showToast("Изображение сгенерировано и прикреплено!");
            render();
          } else {
            throw new Error("Не удалось получить сгенерированный файл");
          }
        } catch (err) {
          console.error("Image generation error:", err);
          if (errorEl) {
            errorEl.textContent = err.message || "Ошибка генерации";
            errorEl.style.display = "block";
          }
          if (loaderEl) loaderEl.style.display = "none";
          if (actionsEl) actionsEl.style.display = "block";
          if (promptEl) promptEl.disabled = false;
        }
      }

      function openGenerated() {
        const c = selectedContent();
        openModal(c.headline, [c.headline, "", c.body, "", c.tags].filter(Boolean).join("\n"), `<div class="actions"><button class="btn" data-action="copy-current">${icons.copy} Скопировать</button><button class="btn primary" data-action="add-to-queue">В очередь</button></div>`);
      }

      function openQueue(id) {
        const post = state.queue.find((item) => item.id === id);
        if (!post) return;
        const media = state.media.find((item) => item.id === post.mediaId);
        el.modalRoot.innerHTML = `
          <div class="modal-backdrop" data-action="close-modal" data-backdrop="true">
            <div class="modal-card" role="dialog" aria-modal="true">
              <div class="modal-head">
                <h2 class="modal-title">Редактирование публикации</h2>
                <button class="btn icon-only" data-action="close-modal" aria-label="Закрыть">${icons.close}</button>
              </div>
              <div class="modal-body">
                <div class="form">
                  ${media ? renderPreview(media) : ""}
                  <label class="field"><span class="label">Заголовок</span><input class="input" id="editQueueTitle" value="${escapeHtml(post.title)}"></label>
                  <label class="field"><span class="label">Текст</span><textarea class="textarea" id="editQueueBody">${escapeHtml(post.body)}</textarea></label>
                  <label class="field"><span class="label">Теги</span><input class="input" id="editQueueTags" value="${escapeHtml(post.tags)}"></label>
                  <div class="auto-tight">
                    <label class="field"><span class="label">Дата</span><input class="input" type="date" id="editQueueDate" value="${escapeHtml(post.publishDate || datePart(post.scheduledAt) || todayInputValue())}"></label>
                    <label class="field"><span class="label">Время</span><input class="input" type="time" id="editQueueTime" value="${escapeHtml(post.publishTime || nextHourInputValue())}"></label>
                  </div>
                  <label class="field"><span class="label">Зачем публикуем</span><input class="input" id="editQueueGoal" value="${escapeHtml(post.goal || "")}" placeholder="цель публикации"></label>
                  <label class="field"><span class="label">Почему сейчас</span><input class="input" id="editQueueReason" value="${escapeHtml(post.reason || "")}" placeholder="логика публикации"></label>
                  <div class="actions">
                    <button class="btn primary" data-action="save-queue-edit" data-id="${escapeHtml(post.id)}">Сохранить</button>
                    <button class="btn" data-action="copy-queue" data-id="${escapeHtml(post.id)}">Скопировать</button>
                    ${post.platform === "telegram"
                      ? `<button class="btn green" data-action="publish-one" data-id="${escapeHtml(post.id)}">Опубликовать</button>`
                      : ""
                    }
                    <button class="btn danger" data-action="remove-queue" data-id="${escapeHtml(post.id)}">Удалить</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
      }

      function openMedia(id) {
        const item = state.media.find((m) => m.id === id);
        if (!item) return;
        el.modalRoot.innerHTML = `
          <div class="modal-backdrop" data-action="close-modal" data-backdrop="true">
            <div class="modal-card" role="dialog" aria-modal="true">
              <div class="modal-head"><h2 class="modal-title">${escapeHtml(item.name)}</h2><button class="btn icon-only" data-action="close-modal">${icons.close}</button></div>
              <div class="modal-body"><div class="form">${renderPreview(item)}<pre class="modal-pre">${escapeHtml(item.url)}</pre><div class="actions"><button class="btn" data-action="copy-text" data-text="${escapeHtml(item.url)}">Скопировать ссылку</button><button class="btn primary" data-action="select-media-card" data-id="${escapeHtml(item.id)}">Выбрать для публикации</button></div></div></div>
            </div>
          </div>
        `;
      }

      async function copyText(text) {
        try {
          await navigator.clipboard.writeText(text);
          showToast("Скопировано");
        } catch {
          const area = document.createElement("textarea");
          area.value = text;
          document.body.appendChild(area);
          area.select();
          document.execCommand("copy");
          area.remove();
          showToast("Скопировано");
        }
      }

      document.addEventListener("click", (event) => {
        const target = event.target.closest("[data-action]");
        if (!target) return;
        const action = target.dataset.action;

        if (action === "close-modal" && target.dataset.backdrop === "true" && event.target !== target) return;
        if (action === "close-modal") { closeModal(); return; }
        if (action === "tab") { state.activeTab = target.dataset.tab; closeModal(); render(); scrollToTop(); if (state.activeTab === "settings") fetchConfig(); return; }
        if (action === "logout") { logout(); return; }
        if (action === "check-backend") { checkBackend(); return; }
        if (action === "save-server-config") { saveServerConfig(); return; }
        if (action === "check-ai-key") { checkAiKey(); return; }
        if (action === "generate") { generate(); return; }
        if (action === "select-idea") { state.selectedIdeaId = target.dataset.id; render(); return; }
        if (action === "select-platform") { state.activePlatform = target.dataset.platform; render(); return; }
        if (action === "select-media-card") { state.selectedMediaId = target.dataset.id; closeModal(); showToast("Медиа выбрано"); render(); return; }
        if (action === "open-media") { openMedia(target.dataset.id); return; }
        if (action === "delete-media") { state.media = state.media.filter((item) => item.id !== target.dataset.id); if (state.selectedMediaId === target.dataset.id) state.selectedMediaId = ""; state.queue.forEach((post) => { if (post.mediaId === target.dataset.id) post.mediaId = ""; }); render(); return; }
        if (action === "upload-media") { uploadMedia(); return; }
        if (action === "open-generate-photo-modal") { openGeneratePhotoModal(); return; }
        if (action === "submit-generate-photo") { generatePhotoSubmit(); return; }
        if (action === "open-generated") { openGenerated(); return; }
        if (action === "add-to-queue") { addToQueue(); return; }
        if (action === "open-queue") { openQueue(target.dataset.id); return; }
        if (action === "copy-current") { const c = selectedContent(); copyText([c.headline, "", c.body, "", c.tags].filter(Boolean).join("\n")); return; }
        if (action === "copy-queue") { const p = state.queue.find((item) => item.id === target.dataset.id); if (p) copyText([p.title, "", p.body, "", p.tags].filter(Boolean).join("\n")); return; }
        if (action === "copy-text") { copyText(target.dataset.text || ""); return; }
        if (action === "publish-one") { publishOne(target.dataset.id); return; }
        if (action === "remove-queue") { state.queue = state.queue.filter((item) => item.id !== target.dataset.id); closeModal(); render(); return; }
        if (action === "save-queue-edit") { const p = state.queue.find((item) => item.id === target.dataset.id); if (p) { p.title = document.getElementById("editQueueTitle")?.value || p.title; p.body = document.getElementById("editQueueBody")?.value || p.body; p.tags = document.getElementById("editQueueTags")?.value || ""; p.publishDate = document.getElementById("editQueueDate")?.value || p.publishDate || todayInputValue(); p.publishTime = document.getElementById("editQueueTime")?.value || p.publishTime || nextHourInputValue(); p.scheduledAt = `${p.publishDate}T${p.publishTime}`; p.goal = document.getElementById("editQueueGoal")?.value || ""; p.reason = document.getElementById("editQueueReason")?.value || ""; showToast("Сохранено"); closeModal(); render(); } return; }
        if (action === "clear-queue") { if (confirm("Очистить очередь?")) { state.queue = []; render(); } return; }
        if (action === "new-project") { newProject(); return; }
        if (action === "delete-project") { deleteProject(); return; }
        if (action === "select-project") { state.activeProjectId = target.dataset.id; render(); return; }
        if (action === "clear-logs") { state.logs = []; render(); return; }
        if (action === "save-instagram-config") { saveInstagramConfig(); return; }
        if (action === "connect-youtube") { connectYouTube(); return; }
        if (action === "disconnect-youtube") { disconnectYouTube(); return; }
        if (action === "toggle-secret") { state.secretVisible[target.dataset.field] = !state.secretVisible[target.dataset.field]; render(); return; }
      });

      document.addEventListener("input", (event) => {
        const target = event.target;
        if (target.matches('[data-action="project-input"]')) { activeProject()[target.name] = target.value; saveState(); return; }
        if (target.matches('[data-action="setting-input"]')) { state.settings[target.name] = target.value; saveState(); return; }
        if (target.matches('[data-action="planner-input"]')) { ensurePlanner()[target.name] = target.value; saveState(); return; }
        if (target.matches('[data-action="edit-content"]')) {
          const idea = selectedIdea();
          const field = target.dataset.field;
          const platform = state.activePlatform;
          if (!idea) return;
          if (!idea.formats) idea.formats = {};
          if (!idea.formats[platform]) idea.formats[platform] = { format: platforms[platform]?.name || "Формат", headline: idea.title, body: "", tags: "" };
          idea.formats[platform][field] = target.value;
          if (field === "headline") idea.title = target.value;
          saveState();
          return;
        }
      });

      document.addEventListener("change", (event) => {
        const target = event.target;
        if (target.matches('[data-action="select-media"]')) { state.selectedMediaId = target.value; saveState(); return; }
        if (target.matches('[data-action="setting-input"]')) { render(); return; }
        if (target.id === "modelSelect") {
          const val = target.value;
          if (val !== "custom") {
            state.settings.model = val;
            const customWrapper = document.getElementById("customModelWrapper");
            if (customWrapper) customWrapper.style.display = "none";
            const customInput = document.querySelector('[name="model"]');
            if (customInput) customInput.value = val;
          } else {
            const customInput = document.querySelector('[name="model"]');
            state.settings.model = customInput ? customInput.value : "";
            const customWrapper = document.getElementById("customModelWrapper");
            if (customWrapper) customWrapper.style.display = "block";
          }
          saveState();
          saveServerConfig();
          render();
          return;
        }
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeModal();
      });
    });
  </script>
</body>
</html>
